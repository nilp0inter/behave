feature: LLM response generation
scenarios:
- scenario: Generate a greeting
  steps:
  - step: the LLM is configured
    params:
      temperature: 1.8
      max_tokens: 4096
  - step: the user says "hello"
  - step: a response is generated within the token limit
    params:
      response_timeout: 30.0
- scenario: Generate with full options
  steps:
  - step: the LLM model is selected
    params:
      model: claude-sonnet
      system_prompt: You are a creative storyteller. Be imaginative and expressive.
  - step: the LLM is configured
    params:
      temperature: 1.5
      max_tokens: 4096
  - step: safety filters are set
    params:
      block_unsafe: true
      log_prompts: false
      safety_level: moderate
  - step: the user says "tell me a story"
  - step: a response is generated within the token limit
    params:
      response_timeout: 17.471
